# Typical Laser Parameters for Different Processes
laser_parameters:
  LPBF:
    typical_power: [100.0, 400.0]  # W
    spot_diameter: [50.0e-6, 100.0e-6]  # m
    scan_speed: [0.5, 2.0]  # m/s
    layer_thickness: [20.0e-6, 50.0e-6]  # m
    hatch_spacing: [80.0e-6, 150.0e-6]  # m

  DED:
    typical_power: [500.0, 2000.0]  # W
    spot_diameter: [0.5e-3, 3.0e-3]  # m
    scan_speed: [0.005, 0.05]  # m/s
    powder_feed_rate: [5.0, 30.0]  # g/min
    layer_thickness: [0.2e-3, 1.0e-3]  # m

# Simulation Parameters Guidelines
simulation_params:
  spatial_resolution:
    fine: 1.0e-6  # 1 micron
    medium: 2.0e-6  # 2 microns
    coarse: 5.0e-6  # 5 microns

  time_step:
    thermal_explicit: 1.0e-9  # 1 ns typical
    lbm_stability: 1.0e-8  # 10 ns for stable LBM

  domain_size:
    single_track:
      x: [500.0e-6, 2000.0e-6]  # m
      y: [200.0e-6, 500.0e-6]  # m
      z: [100.0e-6, 300.0e-6]  # m
    multi_track:
      x: [2000.0e-6, 5000.0e-6]  # m
      y: [1000.0e-6, 3000.0e-6]  # m
      z: [200.0e-6, 500.0e-6]  # m

# Dimensionless Numbers for Validation
dimensionless_numbers:
  Prandtl:
    metals: [0.01, 0.1]  # Low Pr typical for liquid metals

  Marangoni:
    formula: "Ma = (dγ/dT * ΔT * L) / (μ * α)"
    typical_range: [100.0, 10000.0]

  Peclet:
    formula: "Pe = (ρ * cp * U * L) / k"
    typical_range: [1.0, 100.0]

  Reynolds:
    formula: "Re = (ρ * U * L) / μ"
    melt_pool_range: [10.0, 1000.0]

  Stefan:
    formula: "Ste = cp * ΔT / L_fusion"
    typical_range: [0.1, 1.0]

  Weber:
    formula: "We = (ρ * U² * L) / σ"
    droplet_range: [1.0, 100.0]

# Numerical Parameters
numerical_params:
  LBM:
    relaxation_time_BGK:
      minimum: 0.5001  # For stability
      recommended: [0.6, 1.0]

    Mach_number:
      maximum: 0.1  # For incompressible assumption
      recommended: 0.01

  convergence_criteria:
    velocity_residual: 1.0e-6
    temperature_residual: 1.0e-5
    mass_conservation: 1.0e-10