      thermal_conductivity: 33.0  # W/(m·K)
      dynamic_viscosity: 3.5e-3  # Pa·s
      kinematic_viscosity: 8.93e-7  # m²/s
    phase_change:
      melting_temperature: 1923.0  # K
      boiling_temperature: 3533.0  # K
