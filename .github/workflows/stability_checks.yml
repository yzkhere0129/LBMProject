name: Stability Regression Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/physics/thermal/**'
      - 'src/physics/lattice/**'
      - 'include/physics/thermal_lbm.h'
      - 'include/physics/lattice_d3q7.h'
      - 'tests/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/physics/thermal/**'
      - 'src/physics/lattice/**'
      - 'include/physics/thermal_lbm.h'
      - 'include/physics/lattice_d3q7.h'
      - 'tests/**'

jobs:
  stability-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.11
        with:
          cuda: '12.0.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart"]'

      - name: Install CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: |
          cd build
          make -j$(nproc) lbm_core lbm_physics

      - name: Build Stability Tests
        run: |
          cd build
          make -j$(nproc) test_flux_limiter test_temperature_bounds test_omega_reduction test_high_pe_stability

      - name: Run Unit Tests - Flux Limiter
        run: |
          cd build
          ctest -R test_flux_limiter --output-on-failure --verbose

      - name: Run Unit Tests - Temperature Bounds
        run: |
          cd build
          ctest -R test_temperature_bounds --output-on-failure --verbose

      - name: Run Regression Tests - Omega Reduction
        run: |
          cd build
          ctest -R test_omega_reduction --output-on-failure --verbose

      - name: Run Integration Tests - High-Pe Stability
        run: |
          cd build
          ctest -R test_high_pe_stability --output-on-failure --verbose

      - name: Generate Test Summary
        if: always()
        run: |
          cd build
          echo "## Stability Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ctest -R "stability|flux_limiter|temperature_bounds|omega" -N | grep "Total Tests" >> $GITHUB_STEP_SUMMARY || true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: build/Testing/Temporary/LastTest.log

  performance-check:
    runs-on: ubuntu-latest
    needs: stability-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.11
        with:
          cuda: '12.0.0'
          method: 'network'

      - name: Configure and Build
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc) test_flux_limiter_overhead

      - name: Run Performance Tests
        run: |
          cd build
          ./tests/performance/test_flux_limiter_overhead --gtest_filter="*Throughput*" || true

      - name: Check Performance Regression
        run: |
          cd build
          ctest -R test_flux_limiter_overhead --output-on-failure || echo "Performance tests are informational only"
