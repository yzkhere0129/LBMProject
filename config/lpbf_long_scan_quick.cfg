# =============================================================================
# LPBF Long Scan - Quick Test Version
# =============================================================================
# Purpose: Quick test of long scanning path with reduced resolution
# Use this to validate setup before running full simulation
# =============================================================================

name = LPBF_Long_Scan_Quick_Test
status = test
purpose = Quick validation of long scan configuration

# -----------------------------------------------------------------------------
# Domain - Reduced resolution (4um cells instead of 2um)
# -----------------------------------------------------------------------------
nx = 150
ny = 75
nz = 50
dx = 4.0e-6

# Physical domain: 600 x 300 x 200 um (same as full version)
# Total cells: 562,500 (1/8 of full)

# -----------------------------------------------------------------------------
# Time Stepping - Faster
# -----------------------------------------------------------------------------
dt = 2.0e-7
num_steps = 3500
output_interval = 50

# Simulation time: 700 us (scan only, no cooldown)
# Output: 70 frames

# -----------------------------------------------------------------------------
# Laser Parameters
# -----------------------------------------------------------------------------
laser_power = 300.0
laser_spot_radius = 50.0e-6
laser_absorptivity = 0.35
laser_penetration_depth = 10.0e-6

# Scanning: 250um path
laser_start_x = 50.0e-6
laser_start_y = 150.0e-6
laser_scan_vx = 0.5
laser_scan_vy = 0.0
laser_shutoff_time = 500.0e-6

# -----------------------------------------------------------------------------
# Material Properties
# -----------------------------------------------------------------------------
thermal_diffusivity = 5.8e-6
kinematic_viscosity = 0.0333
density = 4110.0

# -----------------------------------------------------------------------------
# Physics - Full but faster
# -----------------------------------------------------------------------------
enable_thermal = true
enable_thermal_advection = true
enable_phase_change = true
enable_fluid = true
enable_vof = true
enable_vof_advection = true
enable_surface_tension = true
enable_marangoni = true
enable_laser = true
enable_darcy = true
enable_buoyancy = true
enable_recoil_pressure = true

enable_evaporation_mass_loss = true
enable_solidification_shrinkage = true

# -----------------------------------------------------------------------------
# Force Parameters
# -----------------------------------------------------------------------------
darcy_coefficient = 1.0e5
surface_tension_coeff = 1.65
dsigma_dT = -0.26e-3

# -----------------------------------------------------------------------------
# Boundary Conditions
# -----------------------------------------------------------------------------
enable_radiation_bc = true
emissivity = 0.25
ambient_temperature = 300.0

enable_substrate_cooling = true
substrate_h_conv = 100.0
substrate_temperature = 300.0

# -----------------------------------------------------------------------------
# Output
# -----------------------------------------------------------------------------
output_directory = lpbf_long_scan_quick

# =============================================================================
# Estimate: ~2-3 minutes runtime
# =============================================================================
