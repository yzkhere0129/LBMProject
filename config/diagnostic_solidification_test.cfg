# ============================================================================
# SOLIDIFICATION DIAGNOSTIC TEST
# ============================================================================
# Purpose: Observe solidification shrinkage after laser shutoff
#
# Timeline:
#   0-50 us:   Laser ON (heating/melting)
#   50-150 us: Laser OFF (cooling/solidification)
# ============================================================================

# Domain (smaller for quick test)
nx = 100
ny = 75
nz = 50
dx = 2.0e-6

# Time stepping (1500 steps = 150 us total)
dt = 1.0e-7
num_steps = 1500
output_interval = 100

# All effects enabled
enable_evaporation_mass_loss = true
enable_solidification_shrinkage = true

# Standard physics
enable_thermal = true
enable_thermal_advection = true
enable_phase_change = true
enable_fluid = true
enable_vof = true
enable_vof_advection = true
enable_surface_tension = true
enable_marangoni = true
enable_laser = true
enable_darcy = true
enable_buoyancy = true
enable_recoil_pressure = true

# Laser parameters (short pulse for quick solidification)
laser_power = 300.0
laser_spot_radius = 50.0e-6
laser_absorptivity = 0.35
laser_penetration_depth = 10.0e-6
laser_start_x = 100.0e-6
laser_start_y = 75.0e-6
laser_scan_vx = 0.0
laser_scan_vy = 0.0
laser_shutoff_time = 50.0e-6

# Material properties
thermal_diffusivity = 5.8e-6
density = 4110.0
darcy_coefficient = 1.0e5
surface_tension_coeff = 1.65
dsigma_dT = -0.26e-3

# Boundary conditions
enable_radiation_bc = true
emissivity = 0.25
ambient_temperature = 300.0
enable_substrate_cooling = true
substrate_h_conv = 100.0
substrate_temperature = 300.0

# Output
output_directory = lpbf_solidification_test
