# Phase 6: Marangoni Effect Demonstration
# 展示表面张力驱动的"鼓动"效应

[simulation]
name = "Phase 6 - Marangoni Surface Flow"
output_dir = "phase6_marangoni_output"

[domain]
# 较小的域以快速展示效果
nx = 100
ny = 100
nz = 50
# 160 × 160 × 80 μm (2 μm 分辨率)
Lx = 2.0e-4
Ly = 2.0e-4
Lz = 1.0e-4

[time]
# 更小的时间步以捕捉快速的 Marangoni 流动
dt = 5.0e-8    # 50 ns (比 Phase 5 小 10×)
nsteps = 4000  # 总共 200 μs
output_interval = 50  # 每 2.5 μs 输出一次 (80 帧)

[material]
type = "Ti6Al4V"

[laser]
enable = true
power = 200.0           # 200 W (适中功率)
spot_radius = 50.0e-6   # 50 μm
absorptivity = 0.35
# 激光位置：中心
x_center = 1.0e-4
y_center = 1.0e-4
# 持续照射
turn_off_time = 1.0e-3  # 1 ms (远大于仿真时间)

[physics]
# Phase 6 的关键：启用 Marangoni 效应！
enable_thermal = true
enable_phase_change = true
enable_fluid = true
enable_buoyancy = true
enable_darcy = true
darcy_coefficient = 15.0
enable_marangoni = true        # ← 关键！Phase 5 没有
enable_surface_tension = false # 暂不启用表面张力（先看纯 Marangoni）
enable_vof = false             # 暂不启用 VOF（简化）

[boundary]
thermal = "adiabatic"
fluid = "no_slip"

[initial]
temperature = 300.0  # K
