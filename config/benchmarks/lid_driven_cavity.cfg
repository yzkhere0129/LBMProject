# Lid-Driven Cavity 基准测试
# 参考: Ghia et al. (1982) - 经典CFD验证案例
# 用于验证流体求解器精度和收敛性

simulation:
  name = "Lid-Driven Cavity Benchmark Re=100"
  output_dir = "results/benchmark_cavity_re100"

domain:
  nx = 128
  ny = 128
  nz = 32   # 准3D，保持薄层
  Lx = 1.0e-3  # 1 mm 方腔
  Ly = 1.0e-3
  Lz = 2.5e-4  # 薄层

time:
  dt = 1e-8
  n_steps = 50000   # 足够长达到稳态
  output_interval = 500

material:
  type = "Ti6Al4V"

laser:
  enabled = false

physics:
  thermal = false        # 纯流动问题
  phase_change = false
  fluid = true
  buoyancy = false       # 无热驱动
  darcy = false
  marangoni = false
  fluid_viscosity = 1.0e-5  # 粘度，用于Reynolds数控制

boundary:
  # 顶部盖驱动（通过初始条件设置）
  # 其他墙壁无滑移

initial:
  temperature = 300.0
  # 顶部速度将在代码中单独设置

# 注释：Reynolds数定义
# Re = U*L/ν = 0.1 * 0.001 / 1e-5 = 10 (低Re测试)
# 对于Re=100: U = 1.0 m/s 或 ν = 1e-6
# 对于Re=400: U = 4.0 m/s 或 ν = 2.5e-7
# 对于Re=1000: U = 10.0 m/s 或 ν = 1e-7
