# LPBF Ti6Al4V 实验基准测试
# 参考文献实验参数：
# - Melt pool宽度: 80-400 μm
# - Melt pool深度: 30-100 μm
# - 激光功率: 100-400 W
# - 扫描速度: 0.4-1.2 m/s
# - 光斑半径: 30-50 μm
#
# 本配置使用典型中等功率参数

simulation:
  name = "LPBF Ti6Al4V Experimental Validation"
  output_dir = "results/benchmark_lpbf_ti6al4v"

domain:
  nx = 100
  ny = 100
  nz = 100
  Lx = 5.0e-4   # 500 μm (足够捕获melt pool)
  Ly = 5.0e-4   # 500 μm
  Lz = 3.0e-4   # 300 μm (深度方向)

time:
  dt = 5e-9     # 5 ns时间步
  n_steps = 20000   # 总时长 100 μs
  output_interval = 200

material:
  type = "Ti6Al4V"

laser:
  enabled = true
  power = 200.0           # 200 W (中等功率)
  spot_radius = 4.0e-5    # 40 μm
  absorption = 0.35       # Ti6Al4V典型吸收率
  penetration_depth = 1.0e-5  # 10 μm
  position_x = 2.5e-4     # 域中心
  position_y = 2.5e-4
  position_z = 2.8e-4     # 接近表面

physics:
  thermal = true
  phase_change = true
  fluid = true
  buoyancy = true
  darcy = true
  marangoni = false  # Phase 6功能

  # Phase 5优化参数
  force_magnitude = 0.02
  darcy_constant = 15.0
  gravity_z = -9.81
  beta_thermal = 1.0e-4
  T_ref = -1.0  # 使用熔点作为参考温度

boundary:
  thermal_type = "adiabatic"

initial:
  temperature = 300.0  # 室温

# 预期结果（用于验证）：
# - Melt pool宽度: ~150-200 μm (激光功率200W)
# - Melt pool深度: ~50-80 μm
# - 峰值温度: ~2800-3200 K
# - 液相区对流速度: 0.05-0.5 mm/s (buoyancy主导)
