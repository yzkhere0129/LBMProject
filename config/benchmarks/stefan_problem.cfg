# Stefan问题基准测试
# 经典相变问题，用于验证相变求解器精度

simulation:
  name = "Stefan Problem Benchmark"
  output_dir = "results/benchmark_stefan"

domain:
  nx = 100
  ny = 100
  nz = 1  # 2D问题 (实际运行时nz会被设为1)
  Lx = 1.0e-3  # 1 mm
  Ly = 1.0e-3
  Lz = 1.0e-5  # 很薄，近似2D

time:
  dt = 1e-9  # 更小时间步，精度优先
  n_steps = 10000
  output_interval = 200

material:
  type = "Ti6Al4V"

laser:
  enabled = false  # 不用激光，使用固定边界温度

physics:
  thermal = true
  phase_change = true
  fluid = false  # Stefan问题无对流
  buoyancy = false
  darcy = false
  marangoni = false

boundary:
  thermal_type = "fixed"  # 固定边界温度
  thermal_value = 2500.0  # 超过熔点，驱动融化

initial:
  temperature = 300.0
