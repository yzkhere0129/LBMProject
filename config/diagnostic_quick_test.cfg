# ============================================================================
# QUICK DIAGNOSTIC TEST (500 steps only)
# ============================================================================
# Purpose: Quick test to verify diagnostic output is working
#
# Run command:
#   ./lpbf_sim config/diagnostic_quick_test.cfg --output lpbf_quick_test
# ============================================================================

# Domain (smaller for quick test)
nx = 100
ny = 75
nz = 50
dx = 2.0e-6

# Time stepping (quick: 500 steps = 50 us)
dt = 1.0e-7
num_steps = 500
output_interval = 50

# All effects enabled
enable_evaporation_mass_loss = true
enable_solidification_shrinkage = true

# Standard physics
enable_thermal = true
enable_thermal_advection = true
enable_phase_change = true
enable_fluid = true
enable_vof = true
enable_vof_advection = true
enable_surface_tension = true
enable_marangoni = true
enable_laser = true
enable_darcy = true
enable_buoyancy = true
enable_recoil_pressure = true

# Laser parameters (stationary for simplicity)
laser_power = 300.0
laser_spot_radius = 50.0e-6
laser_absorptivity = 0.35
laser_penetration_depth = 10.0e-6
laser_start_x = 100.0e-6
laser_start_y = 75.0e-6
laser_scan_vx = 0.0
laser_scan_vy = 0.0
laser_shutoff_time = 100.0e-6

# Material properties
thermal_diffusivity = 5.8e-6
density = 4110.0
darcy_coefficient = 1.0e5
surface_tension_coeff = 1.65
dsigma_dT = -0.26e-3

# Boundary conditions
enable_radiation_bc = true
emissivity = 0.25
ambient_temperature = 300.0
enable_substrate_cooling = true
substrate_h_conv = 100.0
substrate_temperature = 300.0

# Output
output_directory = lpbf_quick_test
