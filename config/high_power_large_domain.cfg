# 高功率激光 + 大域（接近激光焊接尺度）
# 测试代码在更大尺度下的表现

simulation:
  name = "High Power Laser - Large Domain"
  output_dir = "results/high_power_large"

domain:
  nx = 120
  ny = 120
  nz = 60
  Lx = 4.0e-4  # 400 μm (比Phase5大2.5倍)
  Ly = 4.0e-4
  Lz = 2.0e-4  # 200 μm

time:
  dt = 5e-10
  n_steps = 6000  # 3 μs
  output_interval = 100

material:
  type = "Ti6Al4V"

laser:
  enabled = true
  power = 2500.0  # 更高功率
  spot_radius = 1.0e-4  # 100 μm (更大光斑)
  absorption = 0.35
  penetration_depth = 2.5e-5  # 25 μm

physics:
  thermal = true
  phase_change = true
  fluid = true
  buoyancy = true
  darcy = true
  marangoni = false
  force_magnitude = 0.02
  darcy_constant = 15.0

boundary:
  thermal_type = "adiabatic"
  fluid_type = "no_slip"

initial:
  temperature = 300.0
