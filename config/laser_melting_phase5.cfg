# LBM仿真配置文件
# 场景: Ti6Al4V激光熔化 - Phase 5 (优化后参数)

simulation:
  name = "Ti6Al4V Laser Melting - Phase 5 Optimized"
  output_dir = "results/phase5_optimized"

domain:
  nx = 80
  ny = 80
  nz = 40
  Lx = 1.6e-4  # 160 μm
  Ly = 1.6e-4
  Lz = 8.0e-5  # 80 μm

time:
  dt = 5e-10  # 0.5 ns
  n_steps = 8000
  output_interval = 100

material:
  type = "Ti6Al4V"

laser:
  enabled = true
  power = 1200.0
  spot_radius = 5.0e-5  # 50 μm
  absorption = 0.35
  penetration_depth = 1.5e-5  # 15 μm

physics:
  thermal = true
  phase_change = true
  fluid = true
  buoyancy = true
  darcy = true
  marangoni = false
  force_magnitude = 0.02  # 格子单位
  darcy_constant = 15.0   # kg/(m³·s) - 优化后的值

boundary:
  thermal_type = "adiabatic"
  fluid_type = "no_slip"

initial:
  temperature = 300.0
