# High Power LPBF Test with Radiation BC
# 195W laser with proper radiation heat loss
# Target: T_max ~ 3300 K (not 10,000 K)

[simulation]
name = "195W LPBF with Radiation BC"
output_dir = "lpbf_195w_radiation_output"

[domain]
nx = 100
ny = 100
nz = 50
Lx = 2.0e-4  # 200 μm
Ly = 2.0e-4
Lz = 1.0e-4  # 100 μm

[time]
dt = 5.0e-8      # 50 ns
nsteps = 10000   # 500 μs total
output_interval = 100
print_interval = 100

[material]
type = "Ti6Al4V"

[laser]
enable = true
power = 195.0        # 195 W (high power test)
spot_radius = 50.0e-6
absorptivity = 0.35
x_center = 1.0e-4
y_center = 1.0e-4
turn_off_time = 1.0e-3  # Never turns off during simulation

[physics]
enable_thermal = true
enable_phase_change = true
enable_fluid = true
enable_buoyancy = true
enable_darcy = true
darcy_coefficient = 15.0
enable_marangoni = true
enable_surface_tension = false
enable_vof = false

[boundary]
# CRITICAL: Enable radiation BC to prevent thermal runaway
thermal = "adiabatic"
fluid = "no_slip"
enable_radiation_bc = true
emissivity = 0.35
ambient_temperature = 300.0

[initial]
temperature = 300.0  # K
