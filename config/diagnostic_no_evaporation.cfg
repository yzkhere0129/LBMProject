# ============================================================================
# DIAGNOSTIC TEST: Disable Evaporation Mass Loss
# ============================================================================
# Purpose: Isolate whether the cavity/depression behind melt pool
#          is caused by evaporation mass loss
#
# Expected result if evaporation is the cause:
#   - Cavity should DISAPPEAR or significantly reduce
#   - Mass conservation should improve
#
# Run command:
#   ./lpbf_sim config/diagnostic_no_evaporation.cfg --output lpbf_no_evaporation
# ============================================================================

# Metadata
name = Diagnostic: No Evaporation Mass Loss
status = testing
purpose = Isolate evaporation as cause of cavity formation

# Domain (use same as production)
nx = 200
ny = 150
nz = 100
dx = 2.0e-6

# Time stepping
dt = 1.0e-7
num_steps = 5000
output_interval = 50

# ============================================================================
# DIAGNOSTIC SETTINGS
# ============================================================================
# CRITICAL: Disable evaporation mass loss
enable_evaporation_mass_loss = false
# Keep shrinkage enabled for comparison
enable_solidification_shrinkage = true

# ============================================================================
# Standard physics (same as production)
# ============================================================================
enable_thermal = true
enable_thermal_advection = true
enable_phase_change = true
enable_fluid = true
enable_vof = true
enable_vof_advection = true
enable_surface_tension = true
enable_marangoni = true
enable_laser = true
enable_darcy = true
enable_buoyancy = true
enable_recoil_pressure = true

# Laser parameters (scanning)
laser_power = 300.0
laser_spot_radius = 50.0e-6
laser_absorptivity = 0.35
laser_penetration_depth = 10.0e-6
laser_start_x = 100.0e-6
laser_start_y = 150.0e-6
laser_scan_vx = 0.5
laser_scan_vy = 0.0
laser_shutoff_time = 700.0e-6

# Material properties (Ti6Al4V)
thermal_diffusivity = 5.8e-6
density = 4110.0
darcy_coefficient = 1.0e5
surface_tension_coeff = 1.65
dsigma_dT = -0.26e-3

# Boundary conditions
enable_radiation_bc = true
emissivity = 0.25
ambient_temperature = 300.0
enable_substrate_cooling = true
substrate_h_conv = 100.0
substrate_temperature = 300.0

# Output
output_directory = lpbf_no_evaporation
