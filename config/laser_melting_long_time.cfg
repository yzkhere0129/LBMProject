# LBM仿真配置文件
# 场景: Ti6Al4V激光熔化 - 长时间仿真查看稳态

simulation:
  name = "Ti6Al4V Laser Melting - Long Time to Steady State"
  output_dir = "results/long_time_steady_state"

domain:
  nx = 80
  ny = 80
  nz = 40
  Lx = 1.6e-4  # 160 μm
  Ly = 1.6e-4
  Lz = 8.0e-5  # 80 μm

time:
  dt = 5e-10      # 0.5 ns
  n_steps = 40000 # 20 μs (5×原来的时间)
  output_interval = 400  # 每2 μs输出一次（减少文件数）

material:
  type = "Ti6Al4V"

laser:
  enabled = true
  power = 1200.0
  spot_radius = 5.0e-5  # 50 μm
  absorption = 0.35
  penetration_depth = 1.5e-5  # 15 μm

physics:
  thermal = true
  phase_change = true
  fluid = true
  buoyancy = true
  darcy = true
  marangoni = false
  force_magnitude = 0.02
  darcy_constant = 15.0

boundary:
  thermal_type = "adiabatic"
  fluid_type = "no_slip"

initial:
  temperature = 300.0

# 预期结果：
# 0-5 μs: 熔池快速生长
# 5-15 μs: 熔池缓慢生长，接近稳态
# 15-20 μs: 熔池尺寸基本不变（稳态）
