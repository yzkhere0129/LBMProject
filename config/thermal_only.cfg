# 纯热传导测试（无相变、无流动）
# 用于验证热传导求解器

simulation:
  name = "Pure Thermal Conduction Test"
  output_dir = "results/thermal_only"

domain:
  nx = 80
  ny = 80
  nz = 40
  Lx = 1.6e-4
  Ly = 1.6e-4
  Lz = 8.0e-5

time:
  dt = 5e-10
  n_steps = 4000
  output_interval = 100

material:
  type = "Ti6Al4V"

laser:
  enabled = true
  power = 1200.0
  spot_radius = 5.0e-5
  absorption = 0.35
  penetration_depth = 1.5e-5

physics:
  thermal = true
  phase_change = false  # 关闭相变
  fluid = false         # 关闭流动
  buoyancy = false
  darcy = false
  marangoni = false

boundary:
  thermal_type = "adiabatic"

initial:
  temperature = 300.0
