# LBM仿真配置文件
# 场景: 激光脉冲快速测试（短时间版本）
# 用途: 快速验证激光开关功能

simulation:
  name = "Laser Pulse Quick Test"
  output_dir = "results/pulse_quick_test"

domain:
  nx = 60      # 更粗网格，加速计算
  ny = 60
  nz = 30
  Lx = 1.5e-4  # 150 μm
  Ly = 1.5e-4
  Lz = 7.5e-5  # 75 μm

time:
  dt = 1e-9       # 1 ns（稍大时间步）
  n_steps = 15000 # 15 μs总时长
  output_interval = 200  # 每200 ns输出一次

material:
  type = "Ti6Al4V"

laser:
  enabled = true
  power = 1200.0
  spot_radius = 5.0e-5
  absorption = 0.35
  penetration_depth = 1.5e-5

  # 激光时间控制
  turn_on_time = 0.0      # 0 μs开启
  turn_off_time = 5.0e-6  # 5 μs关闭（更早）

  position_x = 7.5e-5
  position_y = 7.5e-5
  position_z = 7.0e-5

physics:
  thermal = true
  phase_change = true
  fluid = true
  buoyancy = true
  darcy = true
  force_magnitude = 0.02
  darcy_constant = 15.0
  gravity_z = -9.81
  beta_thermal = 1.0e-4

boundary:
  thermal_type = "adiabatic"

initial:
  temperature = 300.0

# 快速测试版本
# - 更粗网格（60³）→ 计算快
# - 更短时间（15 μs）
# - 更早关闭激光（5 μs）
# 运行时间: ~1分钟
