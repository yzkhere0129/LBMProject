# =============================================================================
# LPBF Long Scanning Path Simulation
# =============================================================================
# Purpose: Simulate a realistic LPBF single-track scan with extended path
# Target: 350 um scan distance at 0.5 m/s = 700 us laser on time
#
# Design philosophy:
# - X direction expanded for full scan path + boundary buffers
# - Y/Z maintained for adequate melt pool capture
# - Observe: heating -> melting -> melt pool elongation -> solidification
# =============================================================================

# -----------------------------------------------------------------------------
# Simulation Metadata
# -----------------------------------------------------------------------------
name = LPBF_Long_Scan_350um
status = active
purpose = Extended single-track LPBF scan to observe full melt pool dynamics

# -----------------------------------------------------------------------------
# Domain Configuration
# -----------------------------------------------------------------------------
# X: 50um buffer + 350um scan + 200um trail buffer = 600um total
# Y: Centered melt pool with adequate side margins
# Z: 80% metal (160um), 20% gas (40um)
nx = 300
ny = 150
nz = 100
dx = 2.0e-6

# Physical domain: 600 x 300 x 200 um

# -----------------------------------------------------------------------------
# Time Stepping
# -----------------------------------------------------------------------------
dt = 1.0e-7
num_steps = 9000
output_interval = 50

# Simulation time: 900 us (700us laser + 200us cooldown)
# Output: 180 frames

# -----------------------------------------------------------------------------
# Laser Parameters
# -----------------------------------------------------------------------------
laser_power = 300.0
laser_spot_radius = 50.0e-6
laser_absorptivity = 0.35
laser_penetration_depth = 10.0e-6

# Scanning configuration
# Start: 25 cells from left edge = 50um
# Scan direction: +X at 0.5 m/s
# Scan distance: 0.5 m/s * 700us = 350um
laser_start_x = 50.0e-6
laser_start_y = 150.0e-6
laser_scan_vx = 0.5
laser_scan_vy = 0.0
laser_shutoff_time = 700.0e-6

# -----------------------------------------------------------------------------
# Material Properties (Ti6Al4V)
# -----------------------------------------------------------------------------
thermal_diffusivity = 5.8e-6
kinematic_viscosity = 0.0333
density = 4110.0

# -----------------------------------------------------------------------------
# Physics Modules
# -----------------------------------------------------------------------------
enable_thermal = true
enable_thermal_advection = true
enable_phase_change = true
enable_fluid = true
enable_vof = true
enable_vof_advection = true
enable_surface_tension = true
enable_marangoni = true
enable_laser = true
enable_darcy = true
enable_buoyancy = true
enable_recoil_pressure = true

# Disabled for diagnostics
enable_evaporation_mass_loss = true
enable_solidification_shrinkage = true

# -----------------------------------------------------------------------------
# Force Model Parameters
# -----------------------------------------------------------------------------
darcy_coefficient = 1.0e5
surface_tension_coeff = 1.65
dsigma_dT = -0.26e-3

# -----------------------------------------------------------------------------
# Boundary Conditions
# -----------------------------------------------------------------------------
enable_radiation_bc = true
emissivity = 0.25
ambient_temperature = 300.0

enable_substrate_cooling = true
substrate_h_conv = 100.0
substrate_temperature = 300.0

# -----------------------------------------------------------------------------
# Output Configuration
# -----------------------------------------------------------------------------
output_directory = lpbf_long_scan

# =============================================================================
# Expected Results:
# =============================================================================
# Time 0-100us: Initial melting, melt pool formation
# Time 100-400us: Melt pool reaches steady-state shape, follows laser
# Time 400-700us: Continued scanning, elongated melt trail
# Time 700-900us: Laser off, cooling and solidification
#
# Key observations:
# - Melt pool shape evolution during scanning
# - Marangoni-driven flow patterns (center-to-edge)
# - Keyhole formation if recoil pressure significant
# - Solidification front propagation after laser shutoff
# =============================================================================
