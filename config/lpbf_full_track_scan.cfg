# =============================================================================
# LPBF Full Single-Track Scan Simulation
# =============================================================================
# Purpose: Complete single-track LPBF simulation with 500um scan path
# This is the most comprehensive single-line scan case
#
# Physics timeline:
# - 0-200us: Melt pool initiation and growth
# - 200-800us: Steady-state scanning with elongated melt pool
# - 800-1000us: Laser off, rapid cooling and full solidification
# =============================================================================

# -----------------------------------------------------------------------------
# Simulation Metadata
# -----------------------------------------------------------------------------
name = LPBF_Full_Track_500um
status = active
purpose = Full single-track LPBF scan for complete melt pool dynamics study

# -----------------------------------------------------------------------------
# Domain Configuration
# -----------------------------------------------------------------------------
# X: 50um buffer + 500um scan + 250um trail = 800um total (400 cells)
# Y: 300um (150 cells) - adequate for melt pool + HAZ
# Z: 200um (100 cells) - 160um metal, 40um gas
nx = 400
ny = 150
nz = 100
dx = 2.0e-6

# Physical domain: 800 x 300 x 200 um
# Total cells: 6,000,000

# -----------------------------------------------------------------------------
# Time Stepping
# -----------------------------------------------------------------------------
dt = 1.0e-7
num_steps = 12000
output_interval = 60

# Simulation time: 1200 us (1000us laser + 200us cooldown)
# Output: 200 frames

# -----------------------------------------------------------------------------
# Laser Parameters (Typical LPBF for Ti6Al4V)
# -----------------------------------------------------------------------------
laser_power = 300.0
laser_spot_radius = 50.0e-6
laser_absorptivity = 0.35
laser_penetration_depth = 10.0e-6

# Scanning configuration
# Start position: 25 cells from left = 50um
# Scan velocity: 0.5 m/s in +X direction
# Scan distance: 0.5 m/s * 1000us = 500um
# End position: 50um + 500um = 550um (cell 275)
laser_start_x = 50.0e-6
laser_start_y = 150.0e-6
laser_scan_vx = 0.5
laser_scan_vy = 0.0
laser_shutoff_time = 1000.0e-6

# -----------------------------------------------------------------------------
# Material Properties (Ti6Al4V)
# -----------------------------------------------------------------------------
thermal_diffusivity = 5.8e-6
kinematic_viscosity = 0.0333
density = 4110.0

# -----------------------------------------------------------------------------
# Physics Modules - Full LPBF
# -----------------------------------------------------------------------------
enable_thermal = true
enable_thermal_advection = true
enable_phase_change = true
enable_fluid = true
enable_vof = true
enable_vof_advection = true
enable_surface_tension = true
enable_marangoni = true
enable_laser = true
enable_darcy = true
enable_buoyancy = true
enable_recoil_pressure = true

enable_evaporation_mass_loss = true
enable_solidification_shrinkage = true

# -----------------------------------------------------------------------------
# Force Model Parameters
# -----------------------------------------------------------------------------
darcy_coefficient = 1.0e5
surface_tension_coeff = 1.65
dsigma_dT = -0.26e-3

# -----------------------------------------------------------------------------
# Boundary Conditions
# -----------------------------------------------------------------------------
enable_radiation_bc = true
emissivity = 0.25
ambient_temperature = 300.0

enable_substrate_cooling = true
substrate_h_conv = 100.0
substrate_temperature = 300.0

# -----------------------------------------------------------------------------
# Output Configuration
# -----------------------------------------------------------------------------
output_directory = lpbf_full_track

# =============================================================================
# Computational Resource Estimate:
# =============================================================================
# Cells: 6M (2x baseline of 3M)
# Steps: 12000
# Estimated time per step: ~1-1.5ms (GPU dependent)
# Total runtime: ~12-18 minutes
#
# Output files: 200 VTK files, ~50-100 MB each = ~10-20 GB total
# =============================================================================

# =============================================================================
# Expected Observations:
# =============================================================================
# 1. Melt Pool Formation (0-100us):
#    - Temperature rise from 300K to >3500K
#    - Phase transition: solid -> mushy -> liquid
#    - Keyhole initiation due to recoil pressure
#
# 2. Steady-State Scanning (100-800us):
#    - Melt pool shape: elongated teardrop
#    - Length: ~200-300um, Width: ~100-150um, Depth: ~50-80um
#    - Marangoni flow: outward radial flow at surface
#    - Keyhole depth: ~30-50um (depending on power)
#
# 3. Cooling Phase (800-1200us):
#    - Rapid solidification from trailing edge
#    - Solidification front velocity: ~0.1-0.5 m/s
#    - Final track width: ~100-120um
#    - Surface roughness from Marangoni instabilities
# =============================================================================
