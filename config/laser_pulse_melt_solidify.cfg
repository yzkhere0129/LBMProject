# LBM仿真配置文件
# 场景: 激光脉冲 - 完整的熔化-凝固过程
# 功能: 演示激光开启和关闭功能，观察熔池生长和凝固

simulation:
  name = "Laser Pulse: Melting and Solidification"
  output_dir = "results/laser_pulse"

domain:
  nx = 80
  ny = 80
  nz = 40
  Lx = 1.6e-4  # 160 μm
  Ly = 1.6e-4
  Lz = 8.0e-5  # 80 μm

time:
  dt = 5e-10      # 0.5 ns
  n_steps = 60000 # 30 μs总时长
  output_interval = 200  # 每100 ns输出一次

material:
  type = "Ti6Al4V"

laser:
  enabled = true
  power = 1200.0
  spot_radius = 5.0e-5  # 50 μm
  absorption = 0.35
  penetration_depth = 1.5e-5  # 15 μm

  # 激光时间控制（新功能！）
  turn_on_time = 0.0      # 立即开启（0 μs）
  turn_off_time = 10.0e-6 # 10 μs后关闭

  # 位置（域中心）
  position_x = 8.0e-5
  position_y = 8.0e-5
  position_z = 7.5e-5

physics:
  thermal = true
  phase_change = true
  fluid = true
  buoyancy = true
  darcy = true
  marangoni = false
  force_magnitude = 0.02
  darcy_constant = 15.0
  gravity_z = -9.81
  beta_thermal = 1.0e-4
  T_ref = -1.0

boundary:
  thermal_type = "adiabatic"
  fluid_type = "no_slip"

initial:
  temperature = 300.0

# ═══════════════════════════════════════════════════════════
# 预期结果
# ═══════════════════════════════════════════════════════════
#
# 时间线:
#   0-10 μs:  激光开启 → 熔池生长（蓝色→红色）
#   10-30 μs: 激光关闭 → 熔池凝固（红色→蓝色）
#
# 在ParaView中:
#   1. 加载 results/laser_pulse/output_*.vtk
#   2. 显示 LiquidFraction (0-1)
#   3. 播放动画观察:
#      - 前50帧 (0-10μs): 红色区域扩大
#      - 后100帧 (10-30μs): 红色区域收缩
#
# 物理过程:
#   - 熔化阶段: 固态→糊状区→液态
#   - 凝固阶段: 液态→糊状区→固态
#   - 对流: 液态区内浮力驱动对流
#
# ═══════════════════════════════════════════════════════════
